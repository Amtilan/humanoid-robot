# Real Unitree G1 adapter overlay.
#
# Swaps the mock robot-adapter for the vendor-SDK image and gives it host
# networking so DDS multicast reaches the G1 control boards on eth10.
#
# Compose it AFTER the base pull file:
#   docker compose \
#     -f docker-compose.yaml \
#     -f docker-compose.unitree.yaml \
#     up -d robot-adapter
#
# SAFETY: the platform's safety gate is fail-closed (e-stop engaged until
# explicitly released), so bringing this up does NOT move the robot. It
# establishes the DDS link and streams real telemetry. Only a released
# gate + a whitelisted capability actuates anything.

services:
  # DDS uses L2 multicast on eth10, so the adapter runs with host
  # networking — it lives outside the compose bridge. That means it can
  # no longer resolve `nats` by service name, so publish NATS on the
  # loopback and point the adapter at it.
  nats:
    ports:
      - "127.0.0.1:4222:4222"

  robot-adapter:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_OWNER:-amtilan}/humanoid-robot-adapter-unitree:${IMAGE_TAG:-main}
    network_mode: host
    command:
      - cortex-robot-adapter
      - run
      - unitree_g1_edu
      - --interface
      - ${HR_UNITREE_IFACE:-eth10}
      - --mic-source
      - ${HR_UNITREE_MIC:-g1}
    environment:
      # Host-net: reach NATS on the published loopback port, not by DNS.
      HR_ROBOT_ADAPTER__NATS__SERVERS: '["nats://127.0.0.1:4222"]'
    # The default-network depends_on from the base file is dropped under
    # host networking; keep the ordering intent without the network dep.
    depends_on:
      nats:
        condition: service_healthy
      core:
        condition: service_healthy

  # G1 front-camera MJPEG bridge — "the robot's eyes". The cameras are wired to
  # the robot's main computer, not this Jetson (no local /dev/video), so frames
  # come from the vendor VideoClient over DDS. Runs the adapter image (has
  # unitree_sdk2py + DDS) on host net so VideoClient reaches the G1 video
  # service on eth10, and serves multipart/x-mixed-replace on :8091. The
  # dashboard nginx proxies /api/v1/robot/camera/ -> host.docker.internal:8091.
  camera:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_OWNER:-amtilan}/humanoid-robot-adapter-unitree:${IMAGE_TAG:-main}
    network_mode: host
    restart: unless-stopped
    entrypoint: ["python", "-m", "humanoid_robot.adapters.unitree_g1.camera_mjpeg"]
    command:
      - "--interface"
      - "${HR_UNITREE_IFACE:-eth10}"
      - "--port"
      - "${HR_CAMERA_PORT:-8091}"
    environment:
      # If a token is set, the bridge requires ?token= too (nginx bypasses
      # core's gate, so the bridge enforces it itself).
      HR_AUTH__TOKEN: "${HR_AUTH__TOKEN:-}"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8091/healthz')\" || exit 1"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  # Live mic monitor — "the robot's hearing". Streams the head-mic multicast
  # as WAV so the dashboard can play what the robot hears (:8092, proxied by
  # the dashboard nginx at /api/v1/robot/mic/). Same host-net pattern as
  # camera; the mic multicast lives on eth10.
  mic:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_OWNER:-amtilan}/humanoid-robot-adapter-unitree:${IMAGE_TAG:-main}
    network_mode: host
    restart: unless-stopped
    entrypoint: ["python", "-m", "humanoid_robot.adapters.unitree_g1.mic_stream"]
    command:
      - "--interface-ip"
      - "${HR_MIC_IFACE_IP:-192.168.123.164}"
      - "--port"
      - "${HR_MIC_PORT:-8092}"
    environment:
      HR_AUTH__TOKEN: "${HR_AUTH__TOKEN:-}"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8092/healthz')\" || exit 1"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  # Voice needs the vendor SDK (G1 speaker AudioClient) AND host networking
  # (the G1 mic is a UDP multicast on 239.168.123.161 over eth10, and the
  # speaker inits DDS on eth10). So it runs the adapter image on host net,
  # exactly like robot-adapter. rag + llama-cpp stay on the bridge and
  # reach each other by service name; voice only needs NATS (loopback).
  voice:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_OWNER:-amtilan}/humanoid-robot-adapter-unitree:${IMAGE_TAG:-main}
    network_mode: host
    # ALSA capture of the USB microphone needs the sound devices + the audio
    # group. arecord ships in the adapter image (alsa-utils). Harmless when the
    # audio_in is unitree_g1 (DDS) instead.
    devices:
      - /dev/snd:/dev/snd
    group_add:
      - audio
    environment:
      HR_VOICE__NATS__SERVERS: '["nats://127.0.0.1:4222"]'
    depends_on:
      nats:
        condition: service_healthy
