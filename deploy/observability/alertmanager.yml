# Alertmanager routing for the humanoid-robot compose stack.
#
# Ships with a "log only" receiver — every firing alert is written to
# the alertmanager container's stdout. Wire in a real notifier (Slack,
# Discord, PagerDuty, ntfy, email) by editing the `receivers` block
# and pointing the appropriate route.  Keep secrets out of git; drop
# them into /etc/humanoid-robot/alertmanager.env and reference via
# EnvironmentFile= or docker `env_file:` when you graduate off the
# stub receiver.

global:
  resolve_timeout: 5m

route:
  receiver: log
  group_by: ["alertname"]
  group_wait: 15s
  group_interval: 1m
  repeat_interval: 30m
  routes:
    - matchers:
        - severity="critical"
      receiver: log
      repeat_interval: 5m

receivers:
  - name: log
    # webhook_configs pointed at /dev/null-equivalent so alertmanager
    # still executes the pipeline; swap in your notifier when ready.
    webhook_configs:
      - url: http://127.0.0.1:9099/noop
        send_resolved: true

inhibit_rules:
  # When cortex-core is down, we don't need to know about high CPU on it.
  - source_matchers:
      - alertname="CortexCoreDown"
    target_matchers:
      - alertname=~"CortexCore(HighCPU|MemoryHigh)"
    equal: ["alertname"]
