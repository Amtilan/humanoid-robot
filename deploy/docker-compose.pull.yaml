# humanoid-robot — pull-only compose file for the robot.
#
# No `build:` blocks. The only artefacts on the robot are this file
# plus /etc/humanoid-robot/*.env overrides. Pull + start:
#
#   IMAGE_TAG=main docker compose -f docker-compose.pull.yaml pull
#   IMAGE_TAG=main docker compose -f docker-compose.pull.yaml up -d
#
# Pin IMAGE_TAG to a signed release tag in production (e.g. v1.0.0).

x-python-base: &python-base
  image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_OWNER:-amtilan}/humanoid-robot-base:${IMAGE_TAG:-main}
  restart: unless-stopped
  depends_on:
    nats:
      condition: service_healthy

services:
  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command:
      - "-c"
      - "/etc/nats/nats.conf"
    volumes:
      - ./nats.conf:/etc/nats/nats.conf:ro
      - nats-jetstream:/tmp/nats/jetstream
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8222/ | head -c 1 || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 20

  core:
    <<: *python-base
    command: ["cortex-core", "serve"]
    environment:
      HR_HTTP__PORT: "8080"
      HR_HTTP__HOST: "0.0.0.0" # pragma: allowlist secret
      HR_NATS__SERVERS: '["nats://nats:4222"]'
      HR_OBSERVABILITY__LOG_LEVEL: "INFO"
      HR_OBSERVABILITY__TRACING_ENABLED: "false"
      HR_AUTH__TOKEN: "${HR_AUTH__TOKEN:-}"
    env_file:
      - path: /etc/humanoid-robot/cortex-core.env
        required: false
    volumes:
      # Persist the audit SQLite + any future core state across restarts.
      - core-state:/var/lib/humanoid-robot
    ports:
      # Loopback by default. Set HR_BIND_ADDR=0.0.0.0 in .env to reach
      # the API from other devices on the LAN — do that ONLY with
      # HR_AUTH__TOKEN set, since the API can dispatch robot commands.
      - "${HR_BIND_ADDR:-127.0.0.1}:8080:8080"
    healthcheck:
      # Readiness gates the manifest / telemetry subscribers, so anything
      # that publishes on the bus must depend on this being healthy.
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/api/v1/system/health/ready || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 3s

  robot-adapter:
    <<: *python-base
    command: ["cortex-robot-adapter", "run", "${HR_ROBOT_ADAPTER__ADAPTER_NAME:-mock}"]
    depends_on:
      nats:
        condition: service_healthy
      core:
        condition: service_healthy
    environment:
      HR_ROBOT_ADAPTER__NATS__SERVERS: '["nats://nats:4222"]'
      HR_ROBOT_ADAPTER__ADAPTER_NAME: "${HR_ROBOT_ADAPTER__ADAPTER_NAME:-mock}"
      HR_ROBOT_ADAPTER__TELEMETRY_INTERVAL_S: "5"
    env_file:
      - path: /etc/humanoid-robot/cortex-robot-adapter.env
        required: false

  dashboard:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_OWNER:-amtilan}/humanoid-robot-dashboard:${IMAGE_TAG:-main}
    restart: unless-stopped
    depends_on:
      - core
    ports:
      # nginx here proxies /api + the WebSocket event stream to core, so
      # this one port is the single entrypoint to everything. Loopback by
      # default; HR_BIND_ADDR=0.0.0.0 exposes it on the LAN.
      - "${HR_BIND_ADDR:-127.0.0.1}:8081:80"

  # ---------------------------------------------------------------------------
  # Opt-in services. Model weights live under /var/lib/humanoid-robot/models
  # on the host (mounted read-only into the container). Enable with:
  #   docker compose --profile voice up -d
  #   docker compose --profile rag   up -d
  # See deploy/scripts/fetch-models.sh for the download runbook.
  # ---------------------------------------------------------------------------

  qdrant:
    image: qdrant/qdrant:v1.11.0
    restart: unless-stopped
    profiles: ["rag"]
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"

  voice:
    <<: *python-base
    profiles: ["voice"]
    command:
      - "cortex-voice"
      - "run"
      - "--config"
      - "/etc/humanoid-robot/voice.yaml"
    environment:
      HR_VOICE__NATS__SERVERS: '["nats://nats:4222"]'
    volumes:
      - /etc/humanoid-robot/voice.yaml:/etc/humanoid-robot/voice.yaml:ro
      - /var/lib/humanoid-robot/models:/var/lib/humanoid-robot/models:ro
    depends_on:
      nats:
        condition: service_healthy
      core:
        condition: service_started

  # Local LLM server (offline). Serves the fetched Qwen GGUF over an
  # OpenAI-compatible HTTP API; cortex-rag reaches it as llama-cpp:8080.
  # CPU build — slow but private; swap the image tag for :server-cuda +
  # `runtime: nvidia` once a Jetson-CUDA build is validated.
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server
    restart: unless-stopped
    profiles: ["rag"]
    command:
      - "-m"
      - "/models/llm/${HR_LLM_GGUF:-qwen2.5-7b-instruct-q5_k_m.gguf}"
      - "--host"
      - "0.0.0.0"      # pragma: allowlist secret
      - "--port"
      - "8080"
      - "-c"
      - "4096"
      - "-t"
      - "${HR_LLM_THREADS:-6}"
    volumes:
      - /var/lib/humanoid-robot/models:/models:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  rag:
    <<: *python-base
    profiles: ["rag"]
    command:
      - "cortex-rag"
      - "run"
      - "--config"
      - "/etc/humanoid-robot/rag.yaml"
    environment:
      HR_RAG__NATS__SERVERS: '["nats://nats:4222"]'
    volumes:
      - /etc/humanoid-robot/rag.yaml:/etc/humanoid-robot/rag.yaml:ro
      - /var/lib/humanoid-robot/models:/var/lib/humanoid-robot/models:ro
      - rag-state:/var/lib/humanoid-robot
    depends_on:
      nats:
        condition: service_healthy
      llama-cpp:
        condition: service_healthy
      qdrant:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Observability profile — enable with:
  #   docker compose --profile metrics up -d
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    profiles: ["metrics"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=14d"
      - "--web.enable-lifecycle"
    volumes:
      - /etc/humanoid-robot/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /etc/humanoid-robot/observability/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"

  alertmanager:
    image: prom/alertmanager:v0.28.0
    restart: unless-stopped
    profiles: ["metrics"]
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      # Expands ${VAR} references inside alertmanager.yml against the
      # process env, so secret webhook URLs stay out of the config
      # bind-mount.
      - "--config.expand-env=true"
    env_file:
      - path: /etc/humanoid-robot/alertmanager.env
        required: false
    volumes:
      - /etc/humanoid-robot/observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    profiles: ["metrics"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin # pragma: allowlist secret
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - /etc/humanoid-robot/observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - /etc/humanoid-robot/observability/grafana/dashboards/provider.yaml:/etc/grafana/provisioning/dashboards/provider.yaml:ro
      - /etc/humanoid-robot/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  nats-jetstream:
  core-state:
  qdrant-data:
  rag-state:
  prometheus-data:
  alertmanager-data:
  grafana-data:
