# humanoid-robot local dev stack.
#
#   docker compose -f deploy/docker-compose.yaml up --build
#
# Every service comes up with mocks — no vendor SDK required.
# The dashboard is served on http://localhost:8080/ and proxies to
# cortex-core (which listens on the docker network as `core:8080`).

x-python-base: &python-base
  build:
    context: ..
    dockerfile: deploy/docker/base.Dockerfile
  restart: unless-stopped
  depends_on:
    nats:
      condition: service_healthy

services:
  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command:
      - "-c"
      - "/etc/nats/nats.conf"
    volumes:
      - ./nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8222/ | head -c 1 || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 20

  core:
    <<: *python-base
    command: ["cortex-core", "serve"]
    environment:
      HR_HTTP__PORT: "8080"
      HR_HTTP__HOST: "0.0.0.0" # pragma: allowlist secret
      HR_NATS__SERVERS: '["nats://nats:4222"]'
      HR_OBSERVABILITY__LOG_LEVEL: "INFO"
      HR_OBSERVABILITY__TRACING_ENABLED: "false"
      # Bearer auth on /api/v1/*: unset = open, set = required.
      HR_AUTH__TOKEN: "${HR_AUTH__TOKEN:-}"
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      # curl comes from the base image; readiness probe fires ONLY after
      # bus.subscribe() calls have all landed, so anything gated on
      # "core is healthy" can publish without a race.
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/api/v1/system/health/ready || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 3s

  robot-adapter:
    <<: *python-base
    command: ["cortex-robot-adapter", "run", "mock"]
    depends_on:
      nats:
        condition: service_healthy
      core:
        condition: service_healthy
    environment:
      HR_ROBOT_ADAPTER__NATS__SERVERS: '["nats://nats:4222"]'
      HR_ROBOT_ADAPTER__ADAPTER_NAME: "mock"
      HR_ROBOT_ADAPTER__TELEMETRY_INTERVAL_S: "5"

  # Video-wall control agent. In dev/autonomous testing this is the built-in
  # simulator; in production the same app runs on the wall's Windows PC with
  # --driver sendinput and core points at it via HR_WALL__AGENT_URL.
  wall-agent:
    <<: *python-base
    command: ["cortex-wall-agent", "--driver", "sim", "--port", "8093"]
    ports:
      - "127.0.0.1:8093:8093"

  dashboard:
    build:
      context: ..
      dockerfile: deploy/docker/dashboard.Dockerfile
    restart: unless-stopped
    depends_on:
      - core
    # nginx proxies the camera stream to the adapter's host-net bridge at
    # host.docker.internal:8091; the mapping must exist or nginx won't start.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8081:80"

  # ---------------------------------------------------------------------------
  # Opt-in services. Model weights are NOT shipped in the image — see
  # deploy/scripts/fetch-models.sh for the download runbook. Enable with:
  #   docker compose --profile voice up            # ASR/TTS pipeline
  #   docker compose --profile rag   up            # Qdrant + grounded QA
  # ---------------------------------------------------------------------------

  qdrant:
    image: qdrant/qdrant:v1.11.0
    restart: unless-stopped
    profiles: ["rag"]
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"

  voice:
    <<: *python-base
    profiles: ["voice"]
    command:
      - "cortex-voice"
      - "run"
      - "--config"
      - "/etc/humanoid-robot/voice.yaml"
    environment:
      HR_VOICE__NATS__SERVERS: '["nats://nats:4222"]'
    volumes:
      # YAML config on host wins over env-vars for stack selection.
      - ./config/voice.yaml:/etc/humanoid-robot/voice.yaml:ro
      # Models: developer creates /var/lib/humanoid-robot/models on the host
      # (or a symlink to a large-file mount) via fetch-models.sh.
      - /var/lib/humanoid-robot/models:/var/lib/humanoid-robot/models:ro
    depends_on:
      nats:
        condition: service_healthy
      core:
        condition: service_started

  rag:
    <<: *python-base
    profiles: ["rag"]
    command:
      - "cortex-rag"
      - "run"
      - "--config"
      - "/etc/humanoid-robot/rag.yaml"
    environment:
      HR_RAG__NATS__SERVERS: '["nats://nats:4222"]'
    volumes:
      - ./config/rag.yaml:/etc/humanoid-robot/rag.yaml:ro
      - ./config/wall-intents.yaml:/etc/humanoid-robot/wall-intents.yaml:ro
      - ./config/presenter-kb.yaml:/etc/humanoid-robot/presenter-kb.yaml:ro
      - /var/lib/humanoid-robot/models:/var/lib/humanoid-robot/models:ro
      - rag-state:/var/lib/humanoid-robot
    depends_on:
      nats:
        condition: service_healthy
      qdrant:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Observability profile — enable with:
  #   docker compose --profile metrics up -d
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    profiles: ["metrics"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=14d"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"

  alertmanager:
    image: prom/alertmanager:v0.28.0
    restart: unless-stopped
    profiles: ["metrics"]
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      # Expands ${VAR} references inside alertmanager.yml against the
      # process env, so secret webhook URLs stay out of the checked-in
      # config file.
      - "--config.expand-env=true"
    env_file:
      # Robot side ships alertmanager.env in /etc/humanoid-robot;
      # dev checkout uses ./config/alertmanager.env if present.
      - path: ./config/alertmanager.env
        required: false
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    profiles: ["metrics"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin # pragma: allowlist secret
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/dashboards/provider.yaml:/etc/grafana/provisioning/dashboards/provider.yaml:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  qdrant-data:
  rag-state:
  prometheus-data:
  alertmanager-data:
  grafana-data:
