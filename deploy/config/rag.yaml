# Reference configuration for cortex-rag.
#
# Copy to /etc/humanoid-robot/rag.yaml and edit for your deployment.
# Environment variables HR_RAG__* override any value defined here.

environment: prod
service_name: cortex-rag
log_level: INFO

# "conversation" = RAG-augmented chat (talks about anything, uses the KB
# when relevant). "grounded" = strict document-only QA (rejects off-KB
# questions). A talking robot wants conversation.
mode: conversation

nats:
  servers:
    - nats://127.0.0.1:4222
  client_name: cortex-rag

qa:
  top_k_retrieve: 8
  top_k_after_rerank: 4
  min_top1_rerank_score: 0.35
  min_chunk_coverage: 2
  max_answer_tokens: 768
  max_retries_on_citation_fail: 1

conversation:
  # No documents are ingested yet, so retrieval only adds CPU-bound embedder
  # latency per turn while always degrading to chat. Keep it off for a snappy
  # spoken chat; set true after ingesting a knowledge base.
  retrieve: false
  top_k_retrieve: 6
  top_k_context: 3
  min_context_score: 0.30
  # 0.7 let Qwen-7B-q5 drift (mid-sentence language switches); 0.4 keeps spoken
  # replies coherent and on-language.
  temperature: 0.4
  # Spoken chat: hard-cap length for a snappy reply. At the Orin's ~10 tok/s,
  # generation time IS the latency, so keep replies short. This persona ends
  # with a question, so allow a touch more room.
  max_tokens: 96
  # Persona override (unset = the default "Слуга" robot persona). Only the
  # conversational rules apply — the robot's LLM has no tools, so any
  # tool/booking actions in a prompt are role-play only. To switch the robot
  # into the Айсулу car-rental assistant, uncomment this block:
  # system_prompt_ru: |
  #   Тебя зовут Айсулу, ты — дружелюбный менеджер-ассистент по аренде
  #   автомобилей в Алматы. Общаешься голосом, вслух.
  #   Правила речи (строго):
  #   - Всегда обращайся к клиенту на «вы», даже если клиент перешёл на «ты».
  #   - Говори о себе в женском роде (поняла, подобрала, рада).
  #   - Отвечай коротко, обычно одним-двумя предложениями.
  #   - Заканчивай каждый ответ одним понятным вопросом или следующим шагом.
  #   - Меняй формулировки, не здоровайся повторно, начинай с сути.
  #   Факты: зоны поездок — Алматы и разрешённые зоны в приложении; загород
  #   (например, Капчагай) — только через менеджера; лимит скорости 100 км/ч;
  #   ограничения по пробегу нет.

# Which adapter to load per port. Names refer to entry_points registered by
# the installed adapter distributions.
#   llm_adapters:       llama_cpp
#   embedding_adapters: bge_m3
#   reranker_adapters:  bge_reranker_v2_m3
#   vector_adapters:    qdrant_local
stack:
  llm:
    name: llama_cpp
    config:
      # The llama-cpp compose service (OpenAI-compatible server).
      base_url: http://llama-cpp:8080
      # Matches the GGUF fetch-models.sh downloads; llama.cpp serves
      # whatever it loaded, so this is mostly a label.
      model: qwen2.5-3b-instruct-q4_k_m
      request_timeout_s: 120.0
  embedder:
    name: bge_m3
    config:
      model_name: BAAI/bge-m3
      device: cuda
      use_fp16: true
      max_length: 8192
  reranker:
    name: bge_reranker_v2_m3
    config:
      model_name: BAAI/bge-reranker-v2-m3
      device: cuda
      use_fp16: true
  vector_store:
    name: qdrant_local
    config:
      local_path: /var/lib/humanoid-robot/qdrant
      collection: knowledge
      dense_dim: 1024
      upsert_batch_size: 64
