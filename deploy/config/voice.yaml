# Reference configuration for cortex-voice.
#
# Copy to /etc/humanoid-robot/voice.yaml and edit for your hardware.
# Environment variables HR_VOICE__* override any value defined here.

environment: prod
service_name: cortex-voice
log_level: INFO

nats:
  servers:
    - nats://127.0.0.1:4222
  client_name: cortex-voice

session:
  language_hint: ru
  min_speech_ms: 200
  silence_hang_ms: 600
  max_utterance_ms: 10000
  require_wake_word: false
  wake_word_grace_ms: 1500
  # Address the robot by name: it only answers utterances that mention "Слуга"
  # (matched on the stem, so declensions Слугу/Слуге/Слугой also trigger).
  # Uses the always-on ASR transcript — no separate wake-word model needed.
  wake_name: "Слуга"
  # Speak answers from ANY source (dashboard chat + browser push-to-talk), not
  # only the robot-mic session — so you can talk via your phone and the robot
  # replies aloud, bypassing its own noisy mic.
  speak_all_answers: true

# Which adapter to load for each port. Names refer to entry_points registered
# by the installed adapter distributions. Currently available names:
#   audio_in_adapters:  alsa | unitree_g1 | null
#   audio_out_adapters: unitree_g1 | null
#   vad_adapters:       silero_v5
#   asr_adapters:       faster_whisper
#   tts_adapters:       piper
#   wakeword_adapters:  openwakeword
stack:
  # USB microphone via ALSA (arecord). The G1's built-in far-field mic
  # (over DDS multicast, name: unitree_g1) is far too quiet/noisy for
  # reliable ASR — a USB lavalier plugged into the Jetson gives a clean,
  # loud signal (measured peak 32132/32767, perfect recognition). The USB
  # sound card enumerates as ALSA card name "Device"; plughw:CARD=Device
  # targets it by name so it survives card-number reshuffles. The voice
  # container needs /dev/snd + alsa-utils (see docker-compose.unitree.yaml
  # and adapter-unitree.Dockerfile). Swap back to unitree_g1 to use the
  # built-in mic.
  audio_in:
    name: alsa
    config:
      device: "plughw:CARD=Device"
      sample_rate_hz: 16000
      channels: 1
  # G1 speaker via the vendor SDK AudioClient; inits DDS on eth10 on first
  # use. Use `null` in CI / on a laptop where nothing should make a sound.
  audio_out:
    name: unitree_g1
    config:
      network_interface: eth10
      volume_pct: 100
  vad:
    name: silero_v5
    config: {}
  # ASR points at a LOCAL model dir. large-v3-turbo is accurate but ~RTF 4 on
  # this CPU (≈13 s for a short reply); `small` is ~RTF 1 (≈3 s) with fine
  # Russian quality for short spoken commands. beam_size 1 (greedy) trims a bit
  # more. Swap back to the large dir for max accuracy at the cost of latency.
  asr:
    name: faster_whisper
    config:
      model_id: /var/lib/humanoid-robot/models/faster-whisper-small
      device: cpu
      compute_type: int8
      beam_size: 1
      # 6 of the Orin's 8 cores → ~1.5-2x faster transcription.
      cpu_threads: 6
      # Prevents the repeat-hallucination loops on short utterances and trims
      # decode time.
      condition_on_previous_text: false
  tts:
    name: piper
    config:
      voice_paths:
        ru: /var/lib/humanoid-robot/models/piper/ru_RU-irina-medium.onnx
        en: /var/lib/humanoid-robot/models/piper/en_US-lessac-medium.onnx
  # wake_word:
  #   name: openwakeword
  #   config:
  #     model_paths: ["/opt/wake/hey_robot.onnx"]
  #     threshold: 0.55
