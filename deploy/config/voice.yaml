# Reference configuration for cortex-voice.
#
# Copy to /etc/humanoid-robot/voice.yaml and edit for your hardware.
# Environment variables HR_VOICE__* override any value defined here.

environment: prod
service_name: cortex-voice
log_level: INFO

nats:
  servers:
    - nats://127.0.0.1:4222
  client_name: cortex-voice

session:
  language_hint: ru
  min_speech_ms: 200
  silence_hang_ms: 600
  max_utterance_ms: 10000
  require_wake_word: false
  wake_word_grace_ms: 1500

# Which adapter to load for each port. Names refer to entry_points registered
# by the installed adapter distributions. Currently available names:
#   audio_in_adapters:  alsa | unitree_g1 | null
#   audio_out_adapters: unitree_g1 | null
#   vad_adapters:       silero_v5
#   asr_adapters:       faster_whisper
#   tts_adapters:       piper
#   wakeword_adapters:  openwakeword
stack:
  # Production on G1: replace `alsa` with `unitree_g1` and drop the `device`
  # setting; the G1 mic feeds a 6-channel multicast stream that the adapter
  # downmixes internally.
  audio_in:
    name: alsa
    config:
      device: plughw:2,0
      sample_rate_hz: 16000
      channels: 1
      frame_ms: 50
  # Production on G1: `unitree_g1` uses the vendor SDK AudioClient — it will
  # init DDS on `network_interface` on first use. Use `null` in CI or on a
  # dev laptop where nothing should actually make a sound.
  audio_out:
    name: null
    config: {}
    # name: unitree_g1
    # config:
    #   network_interface: eth10
    #   volume_pct: 100
  vad:
    name: silero_v5
    config: {}
  asr:
    name: faster_whisper
    config: {}
  tts:
    name: piper
    config:
      voice_paths:
        ru: /opt/piper/voices/ru_RU-ruslan-medium.onnx
        en: /opt/piper/voices/en_US-lessac-medium.onnx
  # wake_word:
  #   name: openwakeword
  #   config:
  #     model_paths: ["/opt/wake/hey_robot.onnx"]
  #     threshold: 0.55
