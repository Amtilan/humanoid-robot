# faq — готовые ответы на частые вопросы.
faq:
  - q: "Режим работы"
    a: "Министерство работает с понедельника по пятницу с 9:00 до 18:30, обед с 13:00 до 14:30."
  - q: "Какие документы нужны для прохода"
    a: "Для прохода нужен документ, удостоверяющий личность, и оформленный пропуск."
  - q: "Как оформить пропуск"
    a: "Скажите мне «оформить визит» — я запишу ваши данные и передам сотруднику охраны."

