# NATS server config for the local compose stack.
# JetStream is enabled so higher-throughput event streams (audio_in
# telemetry, camera frames) get a durable path — see cortex-core's
# NatsEventBus for the subject layout.

port: 4222
http_port: 8222

jetstream {
    store_dir: "/tmp/nats/jetstream"
    max_memory_store: 128MB
    max_file_store: 1GB
}

max_payload: 4MB
max_connections: 256
