# Jetson overlay — combine with docker-compose.pull.yaml on the robot:
#
#   COMPOSE_FILE=docker-compose.yaml:docker-compose.jetson.yaml \
#       docker compose --profile voice --profile rag up -d
#
# `install-on-robot.sh` auto-detects Jetson (checks
# /etc/nv_tegra_release) and writes the COMPOSE_FILE env var into
# /opt/humanoid-robot/.env so `docker compose` reads both files
# by default afterwards.
#
# Prereq: nvidia-container-runtime must be installed on the host.
# JetPack ships it by default; on stock Ubuntu, install
# nvidia-container-toolkit and add `default-runtime: "nvidia"` to
# /etc/docker/daemon.json before this overlay does anything useful.
#
# What this overlay actually enables:
#   * runtime: nvidia — routes container startup through the NVIDIA
#     runtime so the Tegra iGPU is visible.
#   * NVIDIA_VISIBLE_DEVICES=all — mounts every accessible device.
#   * NVIDIA_DRIVER_CAPABILITIES=compute,utility,video — needed for
#     CUDA + hardware video decode (whisper mel-spectrogram pipeline).
#
# Caveat: the current base image is CPU-only python:3.12-slim; even
# with the runtime forwarded, faster-whisper / BGE-M3 / llama.cpp
# fall back to CPU because CUDA libs aren't in the container. A
# Jetson-native base variant (nvcr.io/nvidia/l4t-*) lands in a
# follow-up round; this overlay establishes the plumbing.

# Jetson overlay.  Adds NVIDIA container runtime to voice/rag so the
# Tegra iGPU shows up inside the container.  We DO NOT swap the base
# image — the CPU base runs fine on Jetson, and voice/rag currently
# fall back to CPU inference because a Python-3.12-compatible CUDA
# torch wheel for arm64 doesn't exist yet.  When we ship a proper
# CUDA base (either llama.cpp + CTranslate2 with cuBLAS baked into
# the CPU base, or a Python-3.10-compat inference container), this
# overlay is where the image: swap goes.
services:
  voice:
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video

  rag:
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,video

  # Swap the CPU llama.cpp for the Tegra-CUDA build (see
  # deploy/docker/llamacpp-cuda.Dockerfile). Built natively on the Jetson;
  # in production point HR_LLAMACPP_CUDA_IMAGE at the GHCR ref so the robot
  # pulls instead of building. `-ngl 99` offloads every transformer layer
  # to the iGPU — the whole reason for this overlay (~15-25 tok/s vs 2-5 on
  # CPU). The command is restated in full because compose replaces (not
  # merges) list-valued keys.
  llama-cpp:
    image: ${HR_LLAMACPP_CUDA_IMAGE:-humanoid-robot-llamacpp-cuda:r35.3.1}
    # Built ON the Jetson (arm64 Tegra CUDA), not in the registry — never let
    # `docker compose pull` try to fetch it.
    pull_policy: never
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    command:
      - "-m"
      - "/models/llm/${HR_LLM_GGUF:-qwen2.5-7b-instruct-q5_k_m-00001-of-00002.gguf}"
      - "--host"
      - "0.0.0.0"      # pragma: allowlist secret
      - "--port"
      - "8080"
      - "-c"
      - "4096"
      - "-ngl"
      - "${HR_LLM_NGL:-99}"
    healthcheck:
      # Whichever HTTP client the image ships: the l4t-cuda build has wget,
      # the upstream ggml CPU server image has only curl. rag's
      # depends_on:service_healthy gate needs this to pass on both.
      test: ["CMD-SHELL", "(wget -qO- http://127.0.0.1:8080/health || curl -sf http://127.0.0.1:8080/health) >/dev/null 2>&1 || exit 1"]
      # GPU init + 7B load is slower than the CPU image's 20 s window.
      start_period: 120s
