server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA — every not-a-file path falls through to index.html so the
    # React router can pick it up.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Robot camera MJPEG stream. The adapter's camera bridge runs on HOST
    # networking (it needs DDS multicast on eth10 to reach the G1's video
    # service), so it lives outside the compose network and is reached via the
    # docker host gateway (extra_hosts maps host.docker.internal in compose).
    # `proxy_buffering off` is essential — otherwise nginx buffers the
    # multipart/x-mixed-replace stream and the browser never sees live frames.
    # More specific than /api/ below, so nginx's longest-prefix match wins.
    location /api/v1/robot/camera/ {
        proxy_pass http://host.docker.internal:8091/camera/;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Robot mic monitor (streaming WAV) — same host-net bridge pattern as the
    # camera above; proxy_buffering off is required for live audio.
    location /api/v1/robot/mic/ {
        proxy_pass http://host.docker.internal:8092/mic/;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # cortex-core API + WebSocket bus stream. `core` is the docker service
    # name; the stack's internal DNS resolves it inside the compose network.
    location /api/ {
        proxy_pass http://core:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    location /metrics {
        proxy_pass http://core:8080/metrics;
        proxy_set_header Host $host;
    }
}
