server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA — every not-a-file path falls through to index.html so the
    # React router can pick it up.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cortex-core API + WebSocket bus stream. `core` is the docker service
    # name; the stack's internal DNS resolves it inside the compose network.
    location /api/ {
        proxy_pass http://core:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    location /metrics {
        proxy_pass http://core:8080/metrics;
        proxy_set_header Host $host;
    }
}
