# Local development NATS + JetStream broker.
#
#   docker compose -f deploy/docker/nats.compose.yaml up -d
#
# In production NATS runs as a systemd service on the robot, not in Docker.
services:
  nats:
    image: nats:2.10-alpine
    container_name: humanoid-robot-nats
    restart: unless-stopped
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring HTTP
    command:
      - "--jetstream"
      - "--store_dir=/data"
      - "--http_port=8222"
      - "--name=humanoid-robot-nats"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 2s
      retries: 5

volumes:
  nats-data: {}
