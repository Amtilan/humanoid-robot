name: publish-images

# Builds the two runtime OCI images (Python services base + dashboard)
# and pushes them to GHCR so the robot can pull without cloning source.
#
# Tags:
#   * every push to main → `sha-<git-sha-short>` and `main`
#   * every semver tag  → `v1.2.3` and `latest`
#   * `workflow_dispatch` → same as the current branch's push behaviour
#
# Both images are built for linux/amd64 (developer laptop + CI) AND
# linux/arm64 (Jetson Orin NX).

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  security-events: write   # SARIF upload to GitHub Advanced Security
  id-token: write          # cosign keyless signing via GitHub OIDC

env:
  REGISTRY: ghcr.io
  # IMAGE_OWNER is set at job level by the "Normalise owner" step —
  # OCI references are case-sensitive and cosign refuses uppercase,
  # so github.repository_owner (which preserves case) can't be used
  # verbatim.  Every job that references IMAGE_OWNER runs the
  # normalise step first.

jobs:
  build:
    name: build+push (${{ matrix.image.name }})
    runs-on: ubuntu-24.04
    outputs:
      digest_base:      ${{ steps.export.outputs.digest_humanoid-robot-base }}
      digest_dashboard: ${{ steps.export.outputs.digest_humanoid-robot-dashboard }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: humanoid-robot-base
            dockerfile: deploy/docker/base.Dockerfile
            platforms: "linux/amd64,linux/arm64"
          - name: humanoid-robot-dashboard
            dockerfile: deploy/docker/dashboard.Dockerfile
            platforms: "linux/amd64,linux/arm64"
          - name: humanoid-robot-base-jetson
            dockerfile: deploy/docker/base-jetson.Dockerfile
            # L4T-PyTorch is arm64-only; skip amd64 for the Jetson image.
            platforms: "linux/arm64"
    steps:
      - uses: actions/checkout@v4

      - name: Normalise owner
        run: |
          echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" \
              >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image.name }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=${{ matrix.image.name }}
            org.opencontainers.image.description=humanoid-robot runtime image (${{ matrix.image.name }})
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build + push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.image.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      - name: Sign image (keyless, via GitHub OIDC)
        env:
          COSIGN_YES: "true"   # non-interactive confirmation for OIDC flow
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image.name }}
        run: |
          echo "signing ${IMAGE}@${DIGEST}"
          cosign sign --recursive "${IMAGE}@${DIGEST}"

      - name: Make signature package public
        # GHCR gives freshly-created .sig companion packages the
        # user's default visibility (usually private) even when the
        # main image is public.  cosign verify then 404s on the sig
        # manifest and the R19 installer refuses to pull.  Flip it
        # once here so the fail-closed installer works end-to-end.
        #
        # PATCH is best-effort — the first run for a brand-new image
        # can race the package indexer, and a repeat run for an
        # already-public package returns 200 anyway.  We swallow the
        # error and log a hint rather than fail the whole publish.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGEST: ${{ steps.build.outputs.digest }}
          PACKAGE: ${{ matrix.image.name }}
        run: |
          set -u
          sig_object="${PACKAGE}/${DIGEST/sha256:/sha256-}.sig"
          sig_path="${sig_object//\//%2F}"
          echo "flipping visibility → public for /user/packages/container/${sig_path}"
          if ! gh api --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "/user/packages/container/${sig_path}" \
              -f visibility=public 2>&1 | tee /tmp/gh-flip.log; then
              echo "::warning::visibility flip failed for ${sig_object}"
              echo "::warning::flip it manually at https://github.com/users/${IMAGE_OWNER}/packages/container/${sig_path}/settings"
          fi

      - name: Export digest for downstream scan
        id: export
        run: |
          echo "digest_${{ matrix.image.name }}=${{ steps.build.outputs.digest }}" \
              >> "$GITHUB_OUTPUT"

  scan:
    name: trivy scan (${{ matrix.image.name }})
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: humanoid-robot-base
          - name: humanoid-robot-dashboard
          - name: humanoid-robot-base-jetson
    steps:
      - uses: actions/checkout@v4

      - name: Normalise owner
        run: |
          echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" \
              >> "$GITHUB_ENV"

      - name: Resolve image reference
        id: ref
        run: |
          # Always scan the sha-<short> tag from this build so we're
          # provably looking at exactly what publish just pushed.
          short=${GITHUB_SHA:0:7}
          echo "image=${REGISTRY}/${IMAGE_OWNER}/${{ matrix.image.name }}:sha-${short}" \
              >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR (pull only)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy CVE scan → SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.ref.outputs.image }}
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"      # never block the publish job on findings;
                              # SARIF upload surfaces them separately.

      - name: Trivy CVE scan → summary table
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.ref.outputs.image }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: trivy-${{ matrix.image.name }}

      - name: Upload raw SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.image.name }}
          path: trivy-${{ matrix.image.name }}.sarif
          if-no-files-found: warn
          retention-days: 30

  sbom:
    name: syft SBOM (${{ matrix.image.name }})
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: humanoid-robot-base
          - name: humanoid-robot-dashboard
          - name: humanoid-robot-base-jetson
    steps:
      - name: Normalise owner
        run: |
          echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" \
              >> "$GITHUB_ENV"

      - name: Resolve image reference
        id: ref
        run: |
          short=${GITHUB_SHA:0:7}
          echo "image=${REGISTRY}/${IMAGE_OWNER}/${{ matrix.image.name }}:sha-${short}" \
              >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR (pull only)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.ref.outputs.image }}
          format: spdx-json
          output-file: sbom-${{ matrix.image.name }}.spdx.json
          upload-artifact: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image.name }}
          path: sbom-${{ matrix.image.name }}.spdx.json
          retention-days: 90

  verify:
    name: verify signature (${{ matrix.image.name }})
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: read
      packages: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: humanoid-robot-base
          - name: humanoid-robot-dashboard
          - name: humanoid-robot-base-jetson
    steps:
      - name: Normalise owner
        run: |
          echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" \
              >> "$GITHUB_ENV"

      - name: Resolve image reference
        id: ref
        run: |
          short=${GITHUB_SHA:0:7}
          echo "image=${REGISTRY}/${IMAGE_OWNER}/${{ matrix.image.name }}:sha-${short}" \
              >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR (pull only)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.4.1"

      - name: Verify signature against our workflow's OIDC identity
        env:
          IMAGE: ${{ steps.ref.outputs.image }}
        run: |
          cosign verify "${IMAGE}" \
              --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/publish-images.yaml@" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              | jq . | head -60
