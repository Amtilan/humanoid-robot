name: publish-images

# Builds the two runtime OCI images (Python services base + dashboard)
# and pushes them to GHCR so the robot can pull without cloning source.
#
# Tags:
#   * every push to main → `sha-<git-sha-short>` and `main`
#   * every semver tag  → `v1.2.3` and `latest`
#   * `workflow_dispatch` → same as the current branch's push behaviour
#
# Both images are built for linux/amd64 (developer laptop + CI) AND
# linux/arm64 (Jetson Orin NX).

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  security-events: write   # SARIF upload to GitHub Advanced Security

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: build+push (${{ matrix.image.name }})
    runs-on: ubuntu-24.04
    outputs:
      digest_base:      ${{ steps.export.outputs.digest_humanoid-robot-base }}
      digest_dashboard: ${{ steps.export.outputs.digest_humanoid-robot-dashboard }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: humanoid-robot-base
            dockerfile: deploy/docker/base.Dockerfile
          - name: humanoid-robot-dashboard
            dockerfile: deploy/docker/dashboard.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image.name }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=${{ matrix.image.name }}
            org.opencontainers.image.description=humanoid-robot runtime image (${{ matrix.image.name }})
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build + push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}

      - name: Export digest for downstream scan
        id: export
        run: |
          echo "digest_${{ matrix.image.name }}=${{ steps.build.outputs.digest }}" \
              >> "$GITHUB_OUTPUT"

  scan:
    name: trivy scan (${{ matrix.image.name }})
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: humanoid-robot-base
          - name: humanoid-robot-dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image reference
        id: ref
        run: |
          # Always scan the sha-<short> tag from this build so we're
          # provably looking at exactly what publish just pushed.
          short=${GITHUB_SHA:0:7}
          echo "image=${REGISTRY}/${IMAGE_OWNER}/${{ matrix.image.name }}:sha-${short}" \
              >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR (pull only)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy CVE scan → SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.ref.outputs.image }}
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"      # never block the publish job on findings;
                              # SARIF upload surfaces them separately.

      - name: Trivy CVE scan → summary table
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.ref.outputs.image }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: trivy-${{ matrix.image.name }}

      - name: Upload raw SARIF as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.image.name }}
          path: trivy-${{ matrix.image.name }}.sarif
          if-no-files-found: warn
          retention-days: 30

  sbom:
    name: syft SBOM (${{ matrix.image.name }})
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: humanoid-robot-base
          - name: humanoid-robot-dashboard
    steps:
      - name: Resolve image reference
        id: ref
        run: |
          short=${GITHUB_SHA:0:7}
          echo "image=${REGISTRY}/${IMAGE_OWNER}/${{ matrix.image.name }}:sha-${short}" \
              >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR (pull only)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.ref.outputs.image }}
          format: spdx-json
          output-file: sbom-${{ matrix.image.name }}.spdx.json
          upload-artifact: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image.name }}
          path: sbom-${{ matrix.image.name }}.spdx.json
          retention-days: 90
