[project]
name = "humanoid-robot-adapters-audio-null"
version = "0.0.0"
description = "Null AudioInPort / AudioOutPort — CI and dev fallback."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.9",
    "humanoid-robot-domain",
    "humanoid-robot-ports",
]

[project.entry-points."humanoid_robot.audio_in_adapters"]
null = "humanoid_robot.adapters.audio_null.adapter:build_null_audio_in"

[project.entry-points."humanoid_robot.audio_out_adapters"]
null = "humanoid_robot.adapters.audio_null.adapter:build_null_audio_out"

[tool.uv.sources]
humanoid-robot-domain = { workspace = true }
humanoid-robot-ports = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/humanoid_robot"]
