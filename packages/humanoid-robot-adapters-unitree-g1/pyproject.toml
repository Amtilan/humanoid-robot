[project]
name = "humanoid-robot-adapters-unitree-g1"
version = "0.0.0"
description = "Unitree G1 Edu adapter for humanoid-robot."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.9",
    "humanoid-robot-domain",
    "humanoid-robot-ports",
]

# The Unitree Python SDK is not on PyPI; it is installed on the robot from
# the vendor's git bundle. We treat it as an optional extra so tests and
# packaging work on developer laptops without the SDK.
[project.optional-dependencies]
unitree = []  # placeholder; enforced by the lazy loader in `_sdk.py`

[project.entry-points."humanoid_robot.robot_adapters"]
unitree_g1_edu = "humanoid_robot.adapters.unitree_g1.adapter:UnitreeG1Adapter"

[project.entry-points."humanoid_robot.audio_in_adapters"]
unitree_g1 = "humanoid_robot.adapters.unitree_g1.factories:unitree_g1_audio_in"

[project.entry-points."humanoid_robot.audio_out_adapters"]
unitree_g1 = "humanoid_robot.adapters.unitree_g1.factories:unitree_g1_audio_out"

[tool.uv.sources]
humanoid-robot-domain = { workspace = true }
humanoid-robot-ports = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/humanoid_robot"]
