[project]
name = "humanoid-robot-adapters-vector-qdrant"
version = "0.0.0"
description = "VectorStorePort via Qdrant (local mode)."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.9",
    "humanoid-robot-domain",
    "humanoid-robot-ports",
]

[project.optional-dependencies]
runtime = ["qdrant-client>=1.11"]

[project.entry-points."humanoid_robot.vector_adapters"]
qdrant_local = "humanoid_robot.adapters.vector_qdrant.adapter:build_qdrant_local"

[tool.uv.sources]
humanoid-robot-domain = { workspace = true }
humanoid-robot-ports = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/humanoid_robot"]
