[project]
name = "humanoid-robot-adapters-wall-http"
version = "0.0.0"
description = "WallControlPort implementation over HTTP (video-wall agent client)."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.9",
    "httpx>=0.27",
    "humanoid-robot-domain",
    "humanoid-robot-ports",
]

[project.entry-points."humanoid_robot.wall_adapters"]
http = "humanoid_robot.adapters.wall_http.adapter:WallHttpClient"

[tool.uv.sources]
humanoid-robot-domain = { workspace = true }
humanoid-robot-ports = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/humanoid_robot"]
