[project]
name = "humanoid-robot-adapters-llm-llamacpp"
version = "0.0.0"
description = "LlmPort via HTTP against a llama.cpp server (OpenAI-compat API)."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.9",
    "httpx>=0.27",
    "humanoid-robot-domain",
    "humanoid-robot-ports",
]

[project.entry-points."humanoid_robot.llm_adapters"]
llama_cpp = "humanoid_robot.adapters.llm_llamacpp.adapter:build_llama_cpp_llm"

[tool.uv.sources]
humanoid-robot-domain = { workspace = true }
humanoid-robot-ports = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/humanoid_robot"]
