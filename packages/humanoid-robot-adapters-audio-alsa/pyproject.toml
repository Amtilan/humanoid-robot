[project]
name = "humanoid-robot-adapters-audio-alsa"
version = "0.0.0"
description = "AudioInPort implementation via arecord subprocess."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.9",
    "humanoid-robot-domain",
    "humanoid-robot-ports",
]

# arecord is part of alsa-utils on the system; no Python runtime deps.

[project.entry-points."humanoid_robot.audio_in_adapters"]
alsa = "humanoid_robot.adapters.audio_alsa.adapter:AlsaAudioIn"

[tool.uv.sources]
humanoid-robot-domain = { workspace = true }
humanoid-robot-ports = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/humanoid_robot"]
