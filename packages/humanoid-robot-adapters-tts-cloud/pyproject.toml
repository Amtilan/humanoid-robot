[project]
name = "humanoid-robot-adapters-tts-cloud"
version = "0.0.0"
description = "TtsPort implementation over an OpenAI-compatible /v1/audio/speech API (per-language cloud voices, e.g. Kazakh)."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.9",
    "httpx>=0.27",
    "humanoid-robot-domain",
    "humanoid-robot-ports",
]

[project.entry-points."humanoid_robot.tts_adapters"]
cloud = "humanoid_robot.adapters.tts_cloud.adapter:CloudTts"

[tool.uv.sources]
humanoid-robot-domain = { workspace = true }
humanoid-robot-ports = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/humanoid_robot"]
