[project]
name = "humanoid-robot-adapters-parser-docling"
version = "0.0.0"
description = "DocumentParserPort for PDF/DOCX/XLSX/PPTX via Docling."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.9",
    "humanoid-robot-domain",
    "humanoid-robot-ports",
]

[project.optional-dependencies]
runtime = ["docling>=2.10"]

[project.entry-points."humanoid_robot.parser_adapters"]
pdf = "humanoid_robot.adapters.parser_docling.parsers:build_pdf_parser"
docx = "humanoid_robot.adapters.parser_docling.parsers:build_docx_parser"
xlsx = "humanoid_robot.adapters.parser_docling.parsers:build_xlsx_parser"
pptx = "humanoid_robot.adapters.parser_docling.parsers:build_pptx_parser"

[tool.uv.sources]
humanoid-robot-domain = { workspace = true }
humanoid-robot-ports = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/humanoid_robot"]
