[project]
name = "humanoid-robot-adapters-chunker-token"
version = "0.0.0"
description = "Token-aware chunker with paragraph-preserving boundaries."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.9",
    "humanoid-robot-domain",
    "humanoid-robot-ports",
]

[project.entry-points."humanoid_robot.chunker_adapters"]
token = "humanoid_robot.adapters.chunker_token.chunker:build_token_chunker"

[tool.uv.sources]
humanoid-robot-domain = { workspace = true }
humanoid-robot-ports = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/humanoid_robot"]
