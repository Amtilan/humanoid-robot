[project]
name = "humanoid-robot-adapters-wakeword-openwakeword"
version = "0.0.0"
description = "WakeWordPort implementation using openWakeWord."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.9",
    "humanoid-robot-domain",
    "humanoid-robot-ports",
]

# `openwakeword` pulls tflite-runtime which lacks Python 3.12 wheels on PyPI
# (as of mid-2026). Install it manually on the robot after choosing an
# ONNX-only install path (see README). We ship only the transitive
# dependencies that behave cleanly across platforms.
[project.optional-dependencies]
runtime = ["onnxruntime>=1.19", "numpy>=1.24"]

[project.entry-points."humanoid_robot.wakeword_adapters"]
openwakeword = "humanoid_robot.adapters.wakeword_openwakeword.adapter:OpenWakeWord"

[tool.uv.sources]
humanoid-robot-domain = { workspace = true }
humanoid-robot-ports = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/humanoid_robot"]
