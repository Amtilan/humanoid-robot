[project]
name = "humanoid-robot-adapters-vad-silero"
version = "0.0.0"
description = "VadPort implementation using Silero VAD v5 (ONNX)."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.9",
    "humanoid-robot-domain",
    "humanoid-robot-ports",
]

[project.optional-dependencies]
runtime = ["onnxruntime>=1.19", "numpy>=1.24", "silero-vad>=5.1"]

[project.entry-points."humanoid_robot.vad_adapters"]
silero_v5 = "humanoid_robot.adapters.vad_silero.adapter:SileroVad"

[tool.uv.sources]
humanoid-robot-domain = { workspace = true }
humanoid-robot-ports = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/humanoid_robot"]
