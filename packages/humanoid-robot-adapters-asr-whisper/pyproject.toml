[project]
name = "humanoid-robot-adapters-asr-whisper"
version = "0.0.0"
description = "AsrPort implementation using faster-whisper (CT2 INT8)."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.9",
    "humanoid-robot-domain",
    "humanoid-robot-ports",
]

# `faster-whisper` and its native runtime dependencies are optional to keep
# CI / laptop installs light. Enable on the robot with:
#     uv add humanoid-robot-adapters-asr-whisper[runtime]
[project.optional-dependencies]
runtime = ["faster-whisper>=1.1", "numpy>=1.24"]

[project.entry-points."humanoid_robot.asr_adapters"]
faster_whisper = "humanoid_robot.adapters.asr_whisper.adapter:FasterWhisperAsr"

[tool.uv.sources]
humanoid-robot-domain = { workspace = true }
humanoid-robot-ports = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/humanoid_robot"]
