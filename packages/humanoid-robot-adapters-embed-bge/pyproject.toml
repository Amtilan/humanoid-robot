[project]
name = "humanoid-robot-adapters-embed-bge"
version = "0.0.0"
description = "EmbeddingPort via BGE-M3 (dense + sparse in one forward)."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.9",
    "humanoid-robot-domain",
    "humanoid-robot-ports",
]

[project.optional-dependencies]
# BGE-M3 comes through FlagEmbedding which pulls torch + transformers.
runtime = ["FlagEmbedding>=1.3", "torch>=2.2", "transformers>=4.44"]

[project.entry-points."humanoid_robot.embedding_adapters"]
bge_m3 = "humanoid_robot.adapters.embed_bge.adapter:build_bge_m3"

[tool.uv.sources]
humanoid-robot-domain = { workspace = true }
humanoid-robot-ports = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/humanoid_robot"]
