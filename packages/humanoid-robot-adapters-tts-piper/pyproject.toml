[project]
name = "humanoid-robot-adapters-tts-piper"
version = "0.0.0"
description = "TtsPort implementation using Piper (ONNX)."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.9",
    "humanoid-robot-domain",
    "humanoid-robot-ports",
]

# Piper's Python bindings + ONNX runtime are optional; enable on the target:
#     uv add humanoid-robot-adapters-tts-piper[runtime]
[project.optional-dependencies]
runtime = ["piper-tts>=1.2", "onnxruntime>=1.19"]

[project.entry-points."humanoid_robot.tts_adapters"]
piper = "humanoid_robot.adapters.tts_piper.adapter:PiperTts"

[tool.uv.sources]
humanoid-robot-domain = { workspace = true }
humanoid-robot-ports = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/humanoid_robot"]
