[project]
name = "humanoid-robot-testing"
version = "0.0.0"
description = "Reusable test doubles (fakes, in-memory bus, mock adapters) for humanoid-robot."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.9",
    "humanoid-robot-domain",
    "humanoid-robot-events",
    "humanoid-robot-ports",
]

[tool.uv.sources]
humanoid-robot-domain = { workspace = true }
humanoid-robot-events = { workspace = true }
humanoid-robot-ports = { workspace = true }

# Register the MockRobotAdapter as a discoverable robot adapter so it can be
# selected via `cortex-robot-adapter run mock` in dev/CI compose stacks.
[project.entry-points."humanoid_robot.robot_adapters"]
mock = "humanoid_robot.testing.robot:mock_robot_adapter"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/humanoid_robot"]
