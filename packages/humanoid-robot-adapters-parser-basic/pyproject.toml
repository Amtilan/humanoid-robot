[project]
name = "humanoid-robot-adapters-parser-basic"
version = "0.0.0"
description = "DocumentParserPort for TXT, Markdown, and HTML — no heavy deps."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.9",
    "beautifulsoup4>=4.12",
    "humanoid-robot-domain",
    "humanoid-robot-ports",
]

[project.entry-points."humanoid_robot.parser_adapters"]
text = "humanoid_robot.adapters.parser_basic.parsers:build_text_parser"
markdown = "humanoid_robot.adapters.parser_basic.parsers:build_markdown_parser"
html = "humanoid_robot.adapters.parser_basic.parsers:build_html_parser"

[tool.uv.sources]
humanoid-robot-domain = { workspace = true }
humanoid-robot-ports = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/humanoid_robot"]
