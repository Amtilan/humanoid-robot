[project]
name = "humanoid-robot-domain"
version = "0.0.0"
description = "Pure domain layer (entities, value objects, domain services) for humanoid-robot."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/humanoid_robot"]

[tool.hatch.build.targets.sdist]
include = ["src", "tests", "README.md"]
